fit:
  model:
    model:
      class_path: crop_health_model.models.model.ResNet
      init_args:
        weights: "DEFAULT"
        num_classes: 2
  data:
    batch_size: 32
    data_dir: crop_health_model/.data
    annotations_file: annotations.csv
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
    crop_size: 224
    resize_size: 256
    interpolation: "BILINEAR"
    data_split:
    - 0.8
    - 0.2
  seed_everything: 44
