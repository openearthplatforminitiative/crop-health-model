fit:
  model:
    model:
      class_path: crop_health_model.models.model.ResNet
      init_args:
        weights: "DEFAULT"
        num_classes: 13
  data:
    batch_size: 32
    data_dir: .data
    annotations_file: annotations.csv
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
    crop_size: 224
    resize_size: 256
    interpolation: "BILINEAR"
    data_split:
    - 0.8
    - 0.2
    num_workers: 8
    limit: null
  trainer:
    max_epochs: 25
    devices: 
    - 0
    - 1
    callbacks:
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        mode: "min"
    - class_path: crop_health_model.engines.callbacks.ImagePredictionLogger
      init_args:
        num_samples: 32
    logger: 
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: "tb_logs"
        name: "crop_health_model"
    - class_path: lightning.pytorch.loggers.CSVLogger
      init_args:
        save_dir: "csv_logs"
        name: "crop_health_model"
  seed_everything: 42
  optimizer:
    class_path: torch.optim.Adam
    init_args:
      lr: 0.001
  lr_scheduler:
    class_path: torch.optim.lr_scheduler.StepLR
    init_args:
      step_size: 5
      gamma: 0.1
